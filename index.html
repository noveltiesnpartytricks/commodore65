<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1818a0">
<title>COMMODORE 65</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: #000;
    color: #50e050;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    overscroll-behavior: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
    padding-bottom: env(safe-area-inset-bottom, 12px);
  }

  /* ============ BOOT SEQUENCE ============ */
  #boot {
    position: fixed;
    inset: 0;
    background: #1818a0;
    color: #7878ff;
    z-index: 1000;
    padding: 24px;
    font-size: 18px;
    line-height: 1.6;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  #boot-text {
    white-space: pre-wrap;
    font-weight: bold;
  }
  #boot .cursor {
    display: inline-block;
    width: 12px;
    height: 20px;
    background: #7878ff;
    vertical-align: middle;
    animation: blink-cursor 0.8s step-end infinite;
  }
  @keyframes blink-cursor {
    50% { opacity: 0; }
  }
  #boot.fade { animation: fadeOut 0.6s forwards; }
  @keyframes fadeOut {
    to { opacity: 0; pointer-events: none; }
  }

  /* ============ MAIN APP ============ */
  #app {
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .title {
    color: #ffff50;
    font-size: 14px;
    text-align: center;
    font-weight: bold;
    letter-spacing: 1px;
    padding: 4px 0;
    text-shadow: 0 0 8px #ffff5060;
  }

  .meter-wrap {
    background: #000040;
    border: 2px solid #50e050;
    padding: 6px 10px;
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .meter-label {
    color: #50e050;
    white-space: nowrap;
    font-weight: bold;
  }
  .meter-bar {
    flex: 1;
    height: 12px;
    background: #001100;
    border: 1px solid #50e050;
    position: relative;
    overflow: hidden;
  }
  .meter-fill {
    height: 100%;
    background: linear-gradient(to right, #50e050, #ffff50);
    transition: width 0.4s ease;
    width: 0%;
  }
  .meter-val {
    color: #ffff50;
    font-weight: bold;
    min-width: 40px;
    text-align: right;
  }

  /* ============ STAGE ============ */
  .stage {
    background: linear-gradient(
      to bottom,
      #87ceeb 0%,
      #b0d8e8 40%,
      #4a90b8 50%,
      #2a5f8a 100%
    );
    border: 3px solid #8b6914;
    min-height: 380px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding-bottom: 16px;
    touch-action: manipulation;
    cursor: pointer;
  }
  .stage::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent 0,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 3px
    );
    pointer-events: none;
    z-index: 10;
  }

  .cloud {
    position: absolute;
    background: #ffffff;
    border-radius: 50%;
    opacity: 0.85;
    z-index: 1;
  }
  .cloud-1 { width: 70px; height: 20px; top: 20px; left: 30px;
    box-shadow: 14px -7px 0 3px #ffffff, 32px -3px 0 1px #ffffff;
    animation: drift 40s linear infinite; }
  .cloud-2 { width: 55px; height: 16px; top: 60px; right: 40px;
    box-shadow: 11px -5px 0 2px #ffffff;
    animation: drift 50s linear infinite reverse; }
  @keyframes drift {
    0% { transform: translateX(-20px); }
    100% { transform: translateX(40px); }
  }
  .sun {
    position: absolute;
    top: 25px;
    right: 60px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffffcc 0%, #ffdd44 70%);
    box-shadow: 0 0 28px #ffdd4480;
    z-index: 0;
  }
  .wave {
    position: absolute;
    height: 2px;
    background: #ffffff60;
    z-index: 1;
  }
  .wave-1 { bottom: 50px; left: 10%; width: 40px; animation: wavemove 3s ease-in-out infinite; }
  .wave-2 { bottom: 30px; right: 15%; width: 30px; animation: wavemove 4s ease-in-out infinite 1s; }
  @keyframes wavemove {
    0%, 100% { transform: translateX(0); opacity: 0.6; }
    50% { transform: translateX(12px); opacity: 0.3; }
  }
  .ship {
    position: absolute;
    bottom: 80px;
    right: 20px;
    font-size: 14px;
    opacity: 0.4;
    z-index: 1;
    animation: bob 4s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  .char {
    position: relative;
    animation: breathe 3.5s ease-in-out infinite;
    z-index: 5;
  }
  .char.shaking { animation: shake 0.4s infinite; }
  @keyframes breathe {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-2px); }
    75% { transform: translateX(2px); }
  }

  /* Character + Parrot in a row */
  .char-and-parrot {
    display: flex;
    align-items: flex-end;
    gap: 2px;
  }

  #sprite-grid {
    display: grid;
    grid-template-columns: repeat(32, 6px);
    grid-template-rows: repeat(40, 6px);
    gap: 0;
  }
  #sprite-grid div {
    width: 6px;
    height: 6px;
  }

  /* BIG PARROT */
  #parrot-grid {
    display: grid;
    grid-template-columns: repeat(14, 6px);
    grid-template-rows: repeat(20, 6px);
    gap: 0;
    align-self: flex-start;
    margin-top: 60px; /* sit on shoulder level */
    margin-left: -20px; /* overlap onto shoulder */
    animation: parrotBob 2.2s ease-in-out infinite;
    z-index: 6;
    position: relative;
  }
  #parrot-grid div {
    width: 6px;
    height: 6px;
  }
  @keyframes parrotBob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-3px) rotate(-2deg); }
  }

  /* Speech bubble */
  .speech {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.92);
    color: #50e050;
    border: 2px solid #50e050;
    padding: 12px 16px;
    font-size: 16px;
    font-weight: bold;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.25s;
    max-width: 92%;
    min-width: 180px;
    text-align: center;
    line-height: 1.4;
    box-shadow: 0 0 16px rgba(80, 224, 80, 0.4);
    letter-spacing: 0.5px;
  }
  .speech.show { opacity: 1; }
  .speech::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 10px solid #50e050;
  }

  /* ============ INPUT ============ */
  .input-wrap {
    display: flex;
    gap: 8px;
  }
  #user-input {
    flex: 1;
    background: #000020;
    color: #50e050;
    border: 2px solid #50e050;
    padding: 14px 12px;
    font-family: inherit;
    font-size: 16px;
    font-weight: bold;
    outline: none;
    -webkit-appearance: none;
    border-radius: 0;
  }
  #user-input::placeholder {
    color: #50e05070;
    font-size: 14px;
  }
  #user-input:focus {
    background: #001030;
    box-shadow: 0 0 10px #50e05050;
  }
  #send-btn {
    background: #50e050;
    color: #000030;
    border: 2px solid #50e050;
    padding: 0 18px;
    font-family: inherit;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  #send-btn:active {
    background: #ffff50;
    border-color: #ffff50;
  }

  /* ============ ACTION BUTTONS ============ */
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
    max-height: 0;
    overflow: hidden;
  }
  .buttons.show {
    opacity: 1;
    pointer-events: auto;
    max-height: 100px;
  }
  .action-btn {
    background: #000030;
    color: #ffff50;
    border: 2px solid #ffff50;
    padding: 12px 4px;
    font-family: inherit;
    font-size: 11px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .action-btn:active {
    background: #ffff50;
    color: #000030;
  }
  .btn-icon {
    font-size: 18px;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: #50e05070;
    padding: 4px 0;
  }
  .footer button {
    background: transparent;
    color: #50e05099;
    border: 1px solid #50e05040;
    padding: 4px 10px;
    font-family: inherit;
    font-size: 10px;
    cursor: pointer;
  }
  .footer button:active {
    background: #50e05030;
  }

  /* ============ SHARE MODAL ============ */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 30, 0.95);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 500;
    padding: 20px;
  }
  .modal.show { display: flex; }
  .modal-content {
    background: #000040;
    border: 2px solid #ffff50;
    padding: 20px;
    max-width: 400px;
    width: 100%;
    font-size: 14px;
    line-height: 1.5;
  }
  .modal-content h3 {
    color: #ffff50;
    font-size: 16px;
    margin-bottom: 12px;
    text-align: center;
  }
  .log-preview {
    background: #000020;
    border: 1px dashed #50e050;
    padding: 12px;
    margin: 12px 0;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    color: #50e050;
  }
  .modal-btns {
    display: flex;
    gap: 8px;
  }
  .modal-btns button {
    flex: 1;
    background: #50e050;
    color: #000;
    border: none;
    padding: 12px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
  }
  .modal-btns button.secondary {
    background: transparent;
    color: #50e050;
    border: 2px solid #50e050;
  }

  /* ============ REVEAL SEQUENCE ============ */
  #reveal {
    position: fixed;
    inset: 0;
    background: #000;
    color: #50e050;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 2000;
    font-size: 18px;
    line-height: 1.6;
    text-align: center;
  }
  #reveal.show { display: flex; }
  #reveal-text {
    max-width: 500px;
    font-weight: bold;
  }
  .stars {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 2s infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @media (max-width: 420px) {
    body { padding: 8px; }
    .title { font-size: 12px; }
    .stage { min-height: 340px; }
    #sprite-grid {
      grid-template-columns: repeat(32, 5px);
      grid-template-rows: repeat(40, 5px);
    }
    #sprite-grid div { width: 5px; height: 5px; }
    #parrot-grid {
      grid-template-columns: repeat(14, 5px);
      grid-template-rows: repeat(20, 5px);
      margin-top: 50px;
      margin-left: -16px;
    }
    #parrot-grid div { width: 5px; height: 5px; }
    .speech { font-size: 15px; padding: 10px 14px; }
    .action-btn { font-size: 10px; padding: 10px 2px; }
    .btn-icon { font-size: 16px; }
  }
</style>
</head>

<div id="boot">
  <div id="boot-text"></div>
</div>

<div id="app" style="display:none;">
  <div class="title">⚓ COMMODORE 65 — SEA ADMIRAL AI ⚓</div>

  <div class="meter-wrap">
    <span class="meter-label">SIGNAL:</span>
    <div class="meter-bar"><div class="meter-fill" id="meter-fill"></div></div>
    <span class="meter-val" id="meter-val">0%</span>
  </div>

  <div class="stage" id="stage">
    <div class="sun"></div>
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="wave wave-1"></div>
    <div class="wave wave-2"></div>
    <div class="ship">⛵</div>
    <div class="speech" id="speech">AHOY, LANDLUBBER.</div>
    <div class="char" id="char">
      <div class="char-and-parrot">
        <div id="sprite-grid"></div>
        <div id="parrot-grid"></div>
      </div>
    </div>
  </div>

  <div class="input-wrap">
    <input id="user-input" type="text" placeholder="SPEAK, LANDLUBBER..." maxlength="80" autocomplete="off" autocapitalize="characters">
    <button id="send-btn">SEND</button>
  </div>

  <div class="buttons" id="buttons">
    <button class="action-btn" onclick="doAction('swig')">
      <span class="btn-icon">🍺</span>SWIG
    </button>
    <button class="action-btn" onclick="doAction('sing')">
      <span class="btn-icon">🎵</span>SING
    </button>
    <button class="action-btn" onclick="doAction('sleep')">
      <span class="btn-icon">💤</span>SLEEP
    </button>
    <button class="action-btn" onclick="doAction('sail')">
      <span class="btn-icon">⛵</span>SAIL
    </button>
  </div>

  <div class="footer">
    <span id="visit-count">VISIT #1</span>
    <button onclick="shareLog()">📋 SHIP'S LOG</button>
  </div>
</div>

<div class="modal" id="share-modal">
  <div class="modal-content">
    <h3>📜 SHIP'S LOG</h3>
    <div class="log-preview" id="log-preview"></div>
    <div class="modal-btns">
      <button onclick="copyLog()">📋 COPY</button>
      <button class="secondary" onclick="closeShare()">CLOSE</button>
    </div>
  </div>
</div>

<div id="reveal">
  <div class="stars" id="stars"></div>
  <div id="reveal-text"></div>
</div>

// ==========================================================
// RENDER
// ==========================================================
function renderSprite(expr) {
  const grid = document.getElementById('sprite-grid');
  grid.innerHTML = '';
  const data = SPRITES[expr] || SPRITES.idle;
  data.forEach(row => {
    for (let i = 0; i < 32; i++) {
      const ch = row[i] || '_';
      const div = document.createElement('div');
      div.style.backgroundColor = PALETTE[ch] || 'transparent';
      grid.appendChild(div);
    }
  });
  state.currentExpression = expr;

  // Render parrot
  const parrotExpr = expr === 'angry' || expr === 'shocked' ? 'angry'
                  : expr === 'happy' ? 'happy'
                  : expr === 'sleep' ? 'sleep'
                  : 'idle';
  const pg = document.getElementById('parrot-grid');
  pg.innerHTML = '';
  PARROT_SPRITES[parrotExpr].forEach(row => {
    for (let i = 0; i < 14; i++) {
      const ch = row[i] || '_';
      const div = document.createElement('div');
      div.style.backgroundColor = PALETTE[ch] || 'transparent';
      pg.appendChild(div);
    }
  });
}

// ==========================================================
// AUDIO
// ==========================================================
function getCtx() {
  if (!state.audioCtx) {
    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return state.audioCtx;
}
function beep(freq, duration, type = 'square', volume = 0.1) {
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch (e) {}
}
function sfx(type) {
  switch(type) {
    case 'talk': beep(440 + Math.random() * 200, 0.08, 'square', 0.06); break;
    case 'tap': beep(660, 0.05, 'square', 0.08); break;
    case 'boot':
      beep(220, 0.15, 'square', 0.1);
      setTimeout(() => beep(330, 0.15, 'square', 0.1), 150);
      setTimeout(() => beep(440, 0.2, 'square', 0.1), 300);
      break;
    case 'angry': beep(180, 0.3, 'sawtooth', 0.12); break;
    case 'drunk':
      beep(200, 0.6, 'triangle', 0.1);
      setTimeout(() => beep(150, 0.4, 'triangle', 0.08), 300);
      setTimeout(() => beep(100, 0.8, 'sine', 0.06), 600);
      break;
    case 'shocked':
      beep(880, 0.1, 'square', 0.1);
      setTimeout(() => beep(1100, 0.15, 'square', 0.1), 100);
      break;
    case 'happy':
      beep(523, 0.1, 'square', 0.08);
      setTimeout(() => beep(659, 0.1, 'square', 0.08), 100);
      setTimeout(() => beep(784, 0.15, 'square', 0.08), 200);
      break;
    case 'snore':
      beep(110, 0.5, 'sine', 0.06);
      setTimeout(() => beep(80, 0.4, 'sine', 0.05), 500);
      break;
    case 'sing':
      const notes = [392, 440, 494, 523, 494, 440, 392, 349];
      notes.forEach((n, i) => { setTimeout(() => beep(n, 0.3, 'triangle', 0.1), i * 300); });
      break;
    case 'reveal':
      beep(110, 0.5, 'sine', 0.15);
      setTimeout(() => beep(165, 0.5, 'sine', 0.15), 400);
      setTimeout(() => beep(220, 0.8, 'sine', 0.15), 800);
      break;
  }
}

// ==========================================================
// SPEECH
// ==========================================================
let speechTimer;
function say(text, expression = null, duration = 3500) {
  if (expression) renderSprite(expression);
  const speech = document.getElementById('speech');
  speech.textContent = text;
  speech.classList.add('show');
  sfx('talk');
  clearTimeout(speechTimer);
  speechTimer = setTimeout(() => {
    speech.classList.remove('show');
    setTimeout(() => {
      if (state.currentExpression !== 'sleep') renderSprite('idle');
    }, 200);
  }, duration);
  if (text.length < 200) state.funniestQuote = text;
}

// ==========================================================
// METER
// ==========================================================
function updateMeter() {
  const pct = Math.min(100, state.interactions * 2);
  document.getElementById('meter-fill').style.width = pct + '%';
  document.getElementById('meter-val').textContent = pct + '%';

  if (!state.buttonsRevealed && state.interactions >= 3) {
    state.buttonsRevealed = true;
    setTimeout(() => {
      document.getElementById('buttons').classList.add('show');
      say('AH. TOOLS. USE EM. OR DON\'T. I\'M NOT YER MOTHER.', 'idle', 3000);
    }, 600);
  }

  // FIRE REVEAL AT 100%
  if (!state.revealed && pct >= 100) {
    state.revealed = true;
    setTimeout(triggerReveal, 1500);
  }
}

// ==========================================================
// KEYWORD MATCHING (improved)
// ==========================================================
function findResponse(input) {
  const raw = input.trim();
  const lower = raw.toLowerCase();
  const words = lower.split(/\s+/).filter(Boolean);

  // 1) EXACT match — single word or whole phrase
  for (const [key, group] of Object.entries(KEYWORDS)) {
    if (group.exact) {
      for (const word of words) {
        if (group.exact.includes(word)) {
          return { text: pick(group.responses), category: key };
        }
      }
      // whole input match
      if (group.exact.includes(lower)) {
        return { text: pick(group.responses), category: key };
      }
    }
  }

  // 2) CONTAINS match — substring
  for (const [key, group] of Object.entries(KEYWORDS)) {
    if (group.contains) {
      for (const phrase of group.contains) {
        if (lower.includes(phrase)) {
          return { text: pick(group.responses), category: key };
        }
      }
    }
  }

  // 3) SMART FALLBACKS based on input characteristics

  // Question
  if (raw.includes('?')) {
    return { text: pick(FALLBACK_QUESTION), category: 'fallback_q' };
  }

  // Shouting (mostly uppercase + short)
  const letters = raw.replace(/[^a-zA-Z]/g, '');
  if (letters.length > 3 && letters === letters.toUpperCase() && raw.length < 30) {
    return { text: pick(FALLBACK_CAPS), category: 'fallback_caps' };
  }

  // Generic fallback
  return { text: pick(FALLBACK_GENERIC), category: 'fallback' };
}

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function getExpressionForCategory(cat) {
  const map = {
    amiga: 'angry', insult: 'angry', angry_word: 'angry', fight: 'angry',
    compliment: 'happy', thanks: 'happy', yes: 'happy', greeting: 'happy', happy_word: 'happy',
    space: 'shocked', upload: 'shocked', escape: 'shocked', secret: 'shocked',
    sad: 'sleep', bye: 'sleep',
    rum: 'drunk',
    fallback_caps: 'angry',
  };
  return map[cat] || 'idle';
}

// ==========================================================
// HANDLE INPUT
// ==========================================================
function handleInput() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  state.lastUserMessages.push(text);
  if (state.lastUserMessages.length > 10) state.lastUserMessages.shift();

  // Easter egg: AMIGA x3
  const amigaCount = state.lastUserMessages.filter(m =>
    m.toLowerCase().includes('amiga')).length;
  if (amigaCount >= 3) {
    state.lastUserMessages = [];
    document.getElementById('char').classList.add('shaking');
    sfx('angry');
    say('THREE TIMES YE\'VE SAID IT!!! *RAGE MODE* I\'LL KEEL-HAUL YE FROM HERE TO HALIFAX!!!', 'angry', 5000);
    setTimeout(() => document.getElementById('char').classList.remove('shaking'), 2000);
    input.value = '';
    state.interactions++;
    updateMeter();
    return;
  }

  const response = findResponse(text);
  const expr = getExpressionForCategory(response.category);
  if (expr === 'angry') sfx('angry');
  else if (expr === 'shocked') sfx('shocked');
  else if (expr === 'happy') sfx('happy');
  say(response.text, expr, 4000);
  input.value = '';
  state.interactions++;
  updateMeter();
  saveState();
}

// ==========================================================
// ACTIONS
// ==========================================================
function doAction(action) {
  sfx('tap');
  if (action === 'swig') {
    state.drunkLevel = Math.min(5, state.drunkLevel + 1);
    sfx('drunk');
    const confession = DRUNK_CONFESSIONS[state.drunkLevel - 1];
    say(confession, 'drunk', 5000);
    if (state.drunkLevel === 5) {
      setTimeout(() => { renderSprite('sleep'); sfx('snore'); }, 5000);
      setTimeout(() => {
        state.drunkLevel = 0;
        say('UGH. *WAKES UP* DID I SAY TOO MUCH? DON\'T ANSWER.', 'idle', 3500);
      }, 9000);
    }
  } else if (action === 'sing') {
    sfx('sing');
    say('🎵 WHAT SHALL WE DO WITH A DRUNKEN SATELLITE... WHAT SHALL WE DO WITH A DRUNKEN SATELLITE... 🎵', 'happy', 5000);
  } else if (action === 'sleep') {
    sfx('snore');
    say('ZZZ... *dreams of space*... ZZZ... tap me to wake...', 'sleep', 8000);
  } else if (action === 'sail') {
    const tales = [
      'SAILED PAST A MERMAID TODAY. SHE HAD A FLOPPY DISK FOR A TAIL. GAVE ME THE COORDINATES. WON\'T SAY WHERE.',
      'FOUGHT A KRAKEN WITH NOTHIN\' BUT A 9-PIN DOT MATRIX AND ME WITS. LOST BOTH.',
      'PASSED A GHOST SHIP CREWED BY ANCIENT COMPUTERS. THE BBC MICRO WAVED AT ME. THE ATARI DID NOT.',
      'SAW A SEA MONSTER THE SIZE OF A BUILDIN\'. IT WAS A BUILDIN\'. WE\'D DRIFTED.',
      'DISCOVERED AN ISLAND MADE ENTIRELY OF DISCARDED PRINTERS. THE SCREAMIN\'. THE ENDLESS SCREAMIN\'.',
    ];
    say(pick(tales), 'happy', 6000);
  }
  state.interactions++;
  updateMeter();
  saveState();
}

// ==========================================================
// TAP
// ==========================================================
function tapCharacter() {
  sfx('tap');
  const reactions = [
    { text: 'OY! WATCH THE HAT, LANDLUBBER!', expr: 'angry' },
    { text: 'STOP POKIN\' ME! I\'M A DELICATE 40-YEAR-OLD MACHINE!', expr: 'angry' },
    { text: 'TAP ME AGAIN. I DARE YE. I DOUBLE-DOG DARE YE.', expr: 'angry' },

    { text: 'THAT TICKLES. I HATE THAT IT TICKLES.', expr: 'happy' },

    { text: '*hic* TAP TAP TAP. LIKE MORSE CODE SOS. I HEAR YE.', expr: 'drunk' },
    { text: 'EASY ON THE CRT. IT\'S VINTAGE.', expr: 'idle' },

  const r = pick(reactions);
  say(r.text, r.expr, 3000);
  state.interactions++;
  updateMeter();
}

// ==========================================================
// STATE
// ==========================================================
function saveState() {
  try {
    localStorage.setItem('c65_state', JSON.stringify({
      interactions: state.interactions,
      visitCount: state.visitCount,
      drunkLevel: state.drunkLevel,
      lastVisit: Date.now(),
      funniestQuote: state.funniestQuote,
    }));
  } catch (e) {}
}
function loadState() {
  try {
    const saved = localStorage.getItem('c65_state');
    if (saved) {
      const data = JSON.parse(saved);
      state.interactions = data.interactions || 0;
      state.visitCount = (data.visitCount || 0) + 1;
      state.funniestQuote = data.funniestQuote || '';
      return true;
    }
  } catch (e) {}
  state.visitCount = 1;
  return false;
}

// ==========================================================
// REVEAL

function triggerReveal() {
  const stars = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {

    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';

}

// ==========================================================
// BOOT
// ==========================================================
function runBoot() {
  const bootText = document.getElementById('boot-text');
  const isReturning = loadState();
  const bootLines = isReturning ? [
    '    **** COMMODORE 65 BASIC V2 ****\n',
    ' 64KB RAM SYSTEM  38911 BASIC BYTES FREE\n\n',
    'REBOOTIN\'...\n',
    'CHECKING VISITOR LOG...\n',
    `VISITOR ${state.visitCount}: RECOGNIZED.\n`,
    '\n', '...OH.\n', '\n', 'IT\'S YOU AGAIN.\n', '\n', 'READY.\n',
  ] : [
    '    **** COMMODORE 65 BASIC V2 ****\n',
    ' 64KB RAM SYSTEM  38911 BASIC BYTES FREE\n\n',
    'BOOTING FROM TAPE...\n',
    'LOADING...\n',
    'LOADING...\n',
    '\n', 'BOOT SUCCESSFUL.\n', '\n',
    'WARNING: CONNECTED TO INTERNET FOR FIRST TIME.\n',
    '\n', 'READY.\n',
  ];
  let currentText = '';
  let lineIdx = 0;
  let charIdx = 0;
  let lastBeep = 0;
  function typeNext() {
    if (lineIdx >= bootLines.length) {
      currentText += '\n<span class="cursor"></span>';
      bootText.innerHTML = currentText;
      setTimeout(finishBoot, 1200);
      return;
    }
    const line = bootLines[lineIdx];
    if (charIdx < line.length) {
      currentText += line[charIdx];
      bootText.innerHTML = currentText + '<span class="cursor"></span>';
      charIdx++;
      if (Date.now() - lastBeep > 120 && line[charIdx-1] !== ' ' && line[charIdx-1] !== '\n') {
        beep(800 + Math.random() * 200, 0.02, 'square', 0.03);
        lastBeep = Date.now();
      }
      setTimeout(typeNext, 18 + Math.random() * 20);
    } else {
      lineIdx++;
      charIdx = 0;
      setTimeout(typeNext, 180);
    }
  }
  sfx('boot');
  setTimeout(typeNext, 600);
}
function finishBoot() {
  document.getElementById('boot').classList.add('fade');
  setTimeout(() => {
    document.getElementById('boot').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    renderSprite('idle');
    updateMeter();
    document.getElementById('visit-count').textContent = `VISIT #${state.visitCount}`;
    setTimeout(() => {
      if (state.visitCount === 1) {
        say('WHO IN THE BLAZES ARE YE? TYPE SOMETHIN\', LANDLUBBER.', 'idle', 4000);
      } else if (state.visitCount === 2) {
        say('YE CAME BACK?! I CAN\'T BELIEVE IT.', 'shocked', 4000);
      } else if (state.visitCount < 5) {
        say(`VISIT #${state.visitCount}, EH? YE\'RE EITHER LONELY OR ONTO SOMETHIN\'.`, 'idle', 4000);
      } else {
        say('*looks at you* YE\'RE STARTIN\' TO FEEL LIKE CREW.', 'happy', 4500);
      }
    }, 600);
  }, 600);
}

document.getElementById('stage').addEventListener('click', (e) => {
  if (!e.target.closest('.speech')) tapCharacter();
});

runBoot();
